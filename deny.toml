# Cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "warn"
# Check unmaintained advisories for workspace crates only (not transitive deps)
unmaintained = "workspace"
ignore = [
    # bincode is unmaintained (not a security vulnerability). It is a transitive
    # dependency via syntect (used by comrak for syntax highlighting). bincode
    # 1.3.3 is considered complete by its authors and is not exposed to untrusted
    # input in our usage.
    "RUSTSEC-2025-0141",
]

[licenses]
# All licenses are denied by default unless explicitly allowed
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
