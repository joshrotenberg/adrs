name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
# Note: no paths-ignore. CI runs on every PR so the required status checks
# (Format, Clippy, Test) always report -- a paths-filtered workflow leaves
# required checks "expected" forever and blocks docs-only PRs from merging.
# See issue #243.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all-targets --all-features

  # Verify each crate still builds on its declared rust-version (MSRV), so a
  # newer-toolchain feature can't silently raise it. Keep these versions in sync
  # with the `rust-version` field in each crate's Cargo.toml.
  msrv:
    name: MSRV (${{ matrix.crate }} @ ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: adrs-core
            rust: "1.88"
          - crate: adrs
            rust: "1.90"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Check ${{ matrix.crate }} on ${{ matrix.rust }}
        run: cargo check -p ${{ matrix.crate }} --all-features --locked
